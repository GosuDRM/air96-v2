name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Clone submodule dependencies
      run: |
        git clone --depth 1 https://github.com/qmk/ChibiOS lib/chibios
        git clone --depth 1 https://github.com/qmk/ChibiOS-Contrib lib/chibios-contrib
        git clone --depth 1 https://github.com/qmk/lufa lib/lufa
        git clone --depth 1 https://github.com/qmk/v-usb lib/vusb
        git clone --depth 1 https://github.com/qmk/printf lib/printf

    - name: Install system deps
      run: sudo apt-get update -qq && sudo apt-get install -y gcc-arm-none-eabi dfu-util

    - name: Install QMK and python deps
      run: |
        python3 -m pip install -r requirements.txt
        python3 -m pip install qmk

    - name: Compile Air96 V2
      run: qmk compile -kb air96_v2/ansi -km default

    - name: Rename binary
      run: mv air96_v2_ansi_default.bin air96-v2-c-${{ github.ref_name }}.bin

    - name: Update README with dynamic release link
      run: |
        VERSION="${{ github.ref_name }}"
        sed -i -E "s|air96-v2-c-v[0-9.]+\\.bin|air96-v2-c-${VERSION}.bin|g" README.md
        sed -i -E "s|air96-v2-c-v[0-9.]+\\.bin|air96-v2-c-${VERSION}.bin|g" keyboards/air96_v2/ansi/readme.md
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add README.md keyboards/air96_v2/ansi/readme.md
        git commit -m "docs: dynamically update pre-compiled firmware links to ${VERSION} [skip ci]" || echo "No changes to commit"
        git push origin HEAD:master


    - name: Extract changelog
      run: |
        VERSION="${{ github.ref_name }}"
        awk -v ver="$VERSION" '
          $0 ~ "^## " ver { found=1; print; next }
          /^## v/ { found=0 }
          found { print }
        ' CHANGELOG.md > /tmp/release_notes.md
        cat /tmp/release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: NuPhy Air96 V2 Firmware ${{ github.ref_name }}
        body_path: /tmp/release_notes.md
        files: air96-v2-c-${{ github.ref_name }}.bin
